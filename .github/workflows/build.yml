name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    strategy:
      matrix:
        platform: [windows/amd64, windows/arm64]
        include:
          - platform: windows/amd64
            arch: x64
            output_name: WinCleaner-windows-amd64
          - platform: windows/arm64
            arch: arm64
            output_name: WinCleaner-windows-arm64
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Setup application icon
        run: |
          New-Item -ItemType Directory -Force -Path "build/windows" | Out-Null
          New-Item -ItemType Directory -Force -Path "build" | Out-Null
          Copy-Item "favicon_io/favicon.ico" "build/windows/icon.ico" -Force
          Copy-Item "favicon_io/android-chrome-512x512.png" "build/appicon.png" -Force
        shell: pwsh

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build Windows application
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          if ($version -eq "dev") { $version = "0.0.0-dev" }
          wails build -platform ${{ matrix.platform }} -ldflags "-X 'win-cleaner/internal/app.AppVersion=$version'"
        shell: pwsh

      - name: Create Windows ZIP
        run: |
          cd build/bin
          Compress-Archive -Path WinCleaner.exe -DestinationPath ../../${{ matrix.output_name }}.zip
        shell: pwsh

      - name: Download Inno Setup Chinese language file
        run: |
          $issDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile "$issDir\ChineseSimplified.isl"
        shell: pwsh

      - name: Build Installer with Inno Setup
        run: |
          iscc /DMyAppVersion="${{ steps.get_version.outputs.VERSION }}" build/installer.iss
          Move-Item -Force "build\Output\WinCleaner-Setup-${{ steps.get_version.outputs.VERSION }}.exe" "${{ matrix.output_name }}-Setup.exe"
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ matrix.arch }}-${{ github.sha }}
          path: |
            ${{ matrix.output_name }}.zip
            ${{ matrix.output_name }}-Setup.exe
          retention-days: 5

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download Windows x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build-x64-${{ github.sha }}
          path: artifacts

      - name: Download Windows arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build-arm64-${{ github.sha }}
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Win Cleaner v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## ⚡ Win Cleaner v${{ steps.get_version.outputs.VERSION }}

            Windows 系统垃圾清理与优化工具

            ### ✨ 功能特性

            - 🧹 **垃圾清理**: 扫描并清理 7 类系统垃圾（临时文件、更新缓存、缩略图、日志、浏览器缓存、回收站、预读取）
            - 🧠 **内存优化**: 一键收缩进程工作集，释放物理内存
            - 📊 **系统概览**: CPU、内存、磁盘使用率，显卡信息检测
            - 📋 **进程管理**: 查看进程列表，按 CPU/内存排序，支持结束进程
            - 🌐 **流量监控**: 实时网速、进程网络使用、历史流量统计图表
            - 💾 **磁盘管理**: 分区空间概览、大文件扫描
            - 📈 **历史图表**: 清理记录、优化记录、流量统计的可视化图表
            - 🔌 **端口管理**: 查看监听端口及关联进程 

            ### 💾 下载 直接点击即可

            **x64 架构 (Intel/AMD 处理器)**

            - `WinCleaner-windows-amd64-Setup.exe` - 安装程序（推荐）
            - `WinCleaner-windows-amd64.zip` - 免安装版

            **ARM64 架构 (Windows on ARM)**

            - `WinCleaner-windows-arm64-Setup.exe` - 安装程序（推荐）
            - `WinCleaner-windows-arm64.zip` - 免安装版

            ### 📝 技术栈

            - Wails v2 (Go + Vue3 + Element Plus + ECharts)
            - 纯本地运行，不上传任何数据
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
